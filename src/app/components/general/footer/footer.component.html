<footer>
    <div [@animateFooter]>
        <ul class="footer-left-bar d-none d-md-block">
            <li>
                <a (click)='analyticsService.sendAnalyticEvent("click_github", "footer", "github")'
                    href="https://github.com/benatti-dev" target='_blank' aria-label="GitHub">
                    <i class="fab fa-github"></i>
                </a>
            </li>
            <li>
                <a (click)='analyticsService.sendAnalyticEvent("click_linkedin", "footer", "linkedin")'
                    href="https://www.linkedin.com/in/oleh-sunytsia-05438b174/" target='_blank' aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
            </li>
        </ul>

        <div class="footer-credits text-center">
            <a (click)='analyticsService.sendAnalyticEvent("click_buildWithHeart", "footer", "buildWithHeart")'
                href="https://github.com/benatti-dev/portfolio" target="_blank" class="code-signature">
                <span class="token keyword">new</span> <span class="token class">OlehSunytsia</span>().<span
                    class="token method">buildWithHeart</span>();
            </a>
            <p class="copyright-text">© {{ currentYear }} • Built with Angular & Java philosophy</p>
        </div>

        <div class="footer-right-bar d-none d-md-block">
            <a (click)='analyticsService.sendAnalyticEvent("click_send_mail", "footer", "email")'
                href="mailto:oleh.sunytsia@gmail.com" target='_blank'>oleh.sunytsia@gmail.com</a>
        </div>
    </div>
</footer>
